########################################################################################
#                                   HYPRLAND CONFIG                                    #
#         Consolidated and improved based on our conversation.                         #
########################################################################################

################################
#         MONITOR SETUP        #
################################
monitor=,preferred,1920x1080@60,1
monitor= HDMI-A-1, preferred, auto, 1, mirror, eDP-1

################################
#    ENVIRONMENT VARIABLES     #
################################
env = XCURSOR_SIZE,20
env = HYPRCURSOR_SIZE,20

################################
#          AUTOSTART           #
################################
# exec-once = waybar
# exec-once = hyprpaper
exec-once = bar &
exec-once = waypaper --restore
################################
#     DEFAULT APPLICATIONS     #
################################
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun
################################
#        GENERAL LOOK          #
################################
general {
    gaps_in = 4
    gaps_out = 4
    border_size = 0
    col.active_border = rgba(33ccffee)
    col.inactive_border = rgba(595959aa)
    resize_on_border = true 
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 3           
    rounding_power = 2      
    active_opacity = 1     
    inactive_opacity = 0.95    
    fullscreen_opacity = 1.0   

    blur {
        enabled = true     
        size = 5          
        passes = 3       
        new_optimizations = true
    }
}



################################
#          ANIMATIONS          #
################################
animations {
    enabled = yes

    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.4, 0.8, 0.2, 1.2
    
    animation = windowsIn, 1, 6, smoothOut, slide
    animation = windowsOut, 1, 5, smoothIn, slide
    animation = windowsMove, 1, 5, default
    
    animation = fadeIn, 1, 8, smoothOut
    animation = fadeOut, 1, 8, smoothIn
    
    animation = workspaces, 1, 7, overshot, slidefade 20%
    animation = border, 1, 10, default
    animation = borderangle, 1, 30, default, loop
}

################################
#          LAYOUTS             #
################################
dwindle {
    pseudotile = true
    preserve_split = true
}
master {
    new_status = master
}
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

################################
#           INPUT              #
################################
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}
gestures {
    workspace_swipe_create_new = true
    workspace_swipe_cancel_ratio = 0.15
    workspace_swipe_direction_lock = true
    gesture = 3, up, dispatcher, exec, kitty
    gesture = 3, horizontal, workspace
    gesture = 4, up, fullscreen
    gesture = 4, down, close
}
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

################################
#          KEYBINDS            #
################################
$mainMod = SUPER

# App binds
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = ALT, SPACE, exec, $menu
bind = $mainMod, c, exec, zen-browser
bind = $mainMod, G, exec, waypaper --random
bind = $mainMod, P, exec, kitty -e pacseek
bind = SUPER, L, exec, hyprlock


# Window management
bind = $mainMod, Z, togglefloating
bind = $mainMod, F, fullscreen
bind = $mainMod, P, pseudo
bind = $mainMod, x, killactive
bind = $mainMod, M, exit

# Screenshots (Expanded)
bind = , PRINT, exec, hyprshot -m region

# Waybar & Script Binds
bind = $mainMod, b, exec, pkill waybar
bind = $mainMod, n, exec, waybar


# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Focus movement
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Resize windows with keyboard
bind = $mainMod SHIFT, left, resizeactive, -20 0
bind = $mainMod SHIFT, right, resizeactive, 20 0
bind = $mainMod SHIFT, up, resizeactive, 0 -20
bind = $mainMod SHIFT, down, resizeactive, 0 20

# Workspace scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mouse actions
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind = ,XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = ,XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Media control (requires playerctl)
bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

################################
#      WINDOW BEHAVIOR         #
################################
